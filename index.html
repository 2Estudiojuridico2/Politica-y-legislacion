<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinfonía Legal - Discapacidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

        :root { --depth: 500px; }
        body { 
            background: #0f172a; 
            font-family: 'Space+Grotesk', sans-serif; 
            perspective: 1500px;
            color: #f8fafc;
        }

        /* Efecto 3D de las capas */
        .law-card {
            transform-style: preserve-3d;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .law-card:hover {
            transform: translateZ(20px) rotateX(2deg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: all 0.5s ease;
            opacity: 0;
            transform: rotateX(-15deg);
            transform-origin: top;
        }

        .accordion-content.open {
            grid-template-rows: 1fr;
            opacity: 1;
            transform: rotateX(0deg);
            margin-top: 1.5rem;
        }

        .legal-full-text {
            font-family: 'Lora', serif;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
        }

        /* Estilo de scroll "glassmorphism" */
        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen">

    <div class="max-w-6xl mx-auto">
        <header class="mb-16 text-center floating">
            <h1 class="text-5xl md:text-7xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 mb-4">
                LexDisca 3D
            </h1>
            <p class="text-slate-400 text-xl font-light tracking-widest uppercase">
                Compendio Íntegro de Política y Legislación
            </p>
        </header>

        <div id="app" class="grid gap-8">
            </div>
    </div>

    <script src="datos.js"></script>
    <script>
        const app = document.getElementById('app');

        function render() {
            app.innerHTML = BIBLIOTECA.map((ley, index) => `
                <div class="law-card glass rounded-3xl overflow-hidden shadow-2xl">
                    <button onclick="toggle(${index})" class="w-full p-8 text-left flex justify-between items-center group">
                        <div class="flex items-center gap-6">
                            <span class="text-4xl opacity-50 font-bold text-blue-500">${String(index + 1).padStart(2, '0')}</span>
                            <div>
                                <h2 class="text-2xl font-bold text-white group-hover:text-blue-400 transition-colors">${ley.norma}</h2>
                                <p class="text-blue-400/60 text-sm tracking-wider uppercase">${ley.categoria}</p>
                            </div>
                        </div>
                        <i class="fas fa-plus transition-transform duration-500 text-blue-500" id="icon-${index}"></i>
                    </button>

                    <div id="content-${index}" class="accordion-content">
                        <div class="overflow-hidden p-8 pt-0">
                            <div class="grid md:grid-cols-1 gap-6">
                                ${ley.secciones.map(sec => `
                                    <div class="border-l-2 border-blue-500/30 pl-6 mb-8">
                                        <h3 class="text-emerald-400 font-bold mb-4 flex items-center gap-2">
                                            <i class="fas fa-bookmark text-xs"></i> ${sec.titulo}
                                        </h3>
                                        <div class="legal-full-text p-6 rounded-2xl text-slate-300 scroll-area max-h-[600px] overflow-y-auto">
                                            ${sec.contenido}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggle(index) {
            const content = document.getElementById(`content-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            const allContent = document.querySelectorAll('.accordion-content');
            
            content.classList.toggle('open');
            icon.style.transform = content.classList.contains('open') ? 'rotate(45deg)' : 'rotate(0deg)';
        }

        render();
    </script>
</body>
</html>
