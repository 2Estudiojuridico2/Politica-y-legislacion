<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexDisca 3D - Repositorio Íntegro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

        body { 
            background: #020617; 
            font-family: 'Outfit', sans-serif; 
            color: #f1f5f9;
            perspective: 2000px;
            overflow-x: hidden;
        }

        /* Capas 3D con rotación */
        .law-layer {
            transform-style: preserve-3d;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .layer-open {
            transform: rotateX(5deg) translateZ(30px);
            border-color: #3b82f6;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.7);
        }

        .accordion-body {
            display: grid;
            grid-template-rows: 0fr;
            transition: all 0.6s ease;
            opacity: 0;
        }

        .accordion-body.active {
            grid-template-rows: 1fr;
            opacity: 1;
            padding-bottom: 2rem;
        }

        .legal-text {
            font-family: 'Lora', serif;
            line-height: 1.9;
            font-size: 1.1rem;
        }

        /* Scrollbars profesionales */
        .law-scroll::-webkit-scrollbar { width: 4px; }
        .law-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }

        .sidebar-nav {
            scrollbar-width: none;
        }
        
        .floating-header {
            background: linear-gradient(to bottom, #020617, transparent);
            z-index: 100;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="floating-header sticky top-0 py-8 px-6 text-center">
        <h1 class="text-4xl md:text-6xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400">
            BIBLIOTECA JURÍDICA ÍNTEGRA
        </h1>
        <p class="text-slate-500 mt-2 tracking-[0.3em] text-xs uppercase font-bold">Política y Legislación referida a la Discapacidad</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-10">
        <div id="master-container" class="space-y-12">
            </div>
        <section class="mt-20 mb-10">
    <div class="flex items-center gap-4 mb-8">
        <div class="h-px flex-1 bg-gradient-to-r from-transparent to-blue-600"></div>
        <h3 class="text-blue-400 font-bold uppercase tracking-[0.3em] text-xs">Material Audiovisual</h3>
        <div class="h-px flex-1 bg-gradient-to-l from-transparent to-blue-600"></div>
    </div>

    <div class="law-layer glass rounded-[2.5rem] p-6 md:p-8 shadow-2xl max-w-md mx-auto transform transition-all hover:scale-105">
        <div class="relative w-full rounded-3xl overflow-hidden shadow-inner border border-white/10" style="padding-top: 177.77%;">
            <iframe 
                class="absolute top-0 left-0 w-full h-full"
                src="https://www.youtube.com/embed/VLH8eQejT5o" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen>
            </iframe>
        </div>
        <div class="mt-6 text-center">
            <p class="text-slate-400 text-sm italic font-light">
                <i class="fab fa-youtube text-red-500 mr-2"></i> Cápsula Informativa sobre Derechos
            </p>
        </div>
    </div>
</section>
    </main>

    <script src="datos.js"></script>
    <script>
        const container = document.getElementById('master-container');

        function render() {
            container.innerHTML = LEYES_DB.map((ley, i) => `
                <div class="law-layer rounded-[2.5rem] p-1 shadow-2xl overflow-hidden" id="layer-${i}">
                    <button onclick="toggleLayer(${i})" class="w-full p-8 md:p-12 text-left flex justify-between items-center group">
                        <div class="flex items-center gap-8">
                            <span class="text-6xl font-black text-slate-800 group-hover:text-blue-600 transition-colors">${String(i + 1).padStart(2, '0')}</span>
                            <div>
                                <h2 class="text-2xl md:text-4xl font-bold text-white mb-2">${ley.titulo}</h2>
                                <p class="text-blue-400 font-medium tracking-wide text-sm uppercase">${ley.entidad}</p>
                            </div>
                        </div>
                        <div class="h-16 w-16 rounded-full border border-slate-700 flex items-center justify-center group-hover:border-blue-500 transition-all">
                            <i class="fas fa-chevron-down text-slate-500 group-hover:text-blue-400" id="icon-${i}"></i>
                        </div>
                    </button>

                    <div id="body-${i}" class="accordion-body">
                        <div class="overflow-hidden px-8 md:px-12">
                            
                            <div class="flex gap-4 mb-10 overflow-x-auto pb-4 sidebar-nav">
                                ${ley.capitulos.map((cap, j) => `
                                    <button onclick="scrollToCap(${i}, ${j})" class="whitespace-nowrap px-6 py-2 rounded-full bg-slate-800 border border-slate-700 text-xs font-bold hover:bg-blue-600 transition-all">
                                        ${cap.nombreCorto}
                                    </button>
                                `).join('')}
                            </div>

                            <div class="space-y-16 law-scroll max-h-[70vh] overflow-y-auto pr-6">
                                ${ley.capitulos.map((cap, j) => `
                                    <div id="ley-${i}-cap-${j}" class="space-y-8">
                                        <div class="flex items-center gap-4">
                                            <div class="h-px flex-1 bg-gradient-to-r from-blue-600 to-transparent"></div>
                                            <h3 class="text-emerald-400 font-bold uppercase tracking-widest text-sm">${cap.tituloCapitulo}</h3>
                                        </div>
                                        <div class="grid gap-6">
                                            ${cap.articulos.map(art => `
                                                <div class="glass-card p-8 rounded-3xl">
                                                    <span class="text-blue-500 font-black text-xs uppercase tracking-tighter mb-4 block">Artículo ${art.numero}</span>
                                                    <div class="legal-text text-slate-300">
                                                        ${art.contenido}
                                                    </div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleLayer(i) {
            const body = document.getElementById(`body-${i}`);
            const layer = document.getElementById(`layer-${i}`);
            const icon = document.getElementById(`icon-${i}`);
            
            body.classList.toggle('active');
            layer.classList.toggle('layer-open');
            icon.style.transform = body.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function scrollToCap(leyIdx, capIdx) {
            const target = document.getElementById(`ley-${leyIdx}-cap-${capIdx}`);
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        render();
    </script>
</body>
</html>
