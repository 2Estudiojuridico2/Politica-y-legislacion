<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexDisca 3D - Campus Virtual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap');

        :root {
            --neon-cyan: #06b6d4;
            --neon-violet: #8b5cf6;
            --neon-emerald: #10b981;
            --bg-dark: #020617;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Outfit', sans-serif;
            color: #f8fafc;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
        }

        h1, h2, h3, .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Efecto Glassmorphism (Cristal) */
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Resplandores de Neón (Glow) */
        .glow-cyan:hover {
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.4);
            border-color: rgba(6, 182, 212, 0.6);
        }
        .glow-violet:hover {
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.4);
            border-color: rgba(139, 92, 246, 0.6);
        }
        .glow-emerald:hover {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
            border-color: rgba(16, 185, 129, 0.6);
        }

        /* Línea de tiempo animada */
        .timeline-line {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-violet), var(--neon-emerald));
            opacity: 0.3;
            z-index: 0;
        }

        .timeline-node {
            position: relative;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        
        .timeline-node:hover {
            transform: scale(1.05) translateY(-5px);
        }

        /* Scrollbar Cyber */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }

        /* Modal Background */
        .modal-backdrop {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .modal-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-backdrop.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="antialiased pb-20">

    <header class="relative pt-20 pb-12 text-center z-10">
        <div class="inline-block mb-4 px-6 py-2 rounded-full glass-panel border-cyan-500/30 text-cyan-400 font-bold tracking-[0.2em] text-xs uppercase">
            <i class="fas fa-satellite-dish mr-2 animate-pulse"></i> Todas las modalidades - Política y Legislación Para Personas con Necesidades Especiales - Prof. Zurita Lionel
        </div>
        <h1 class="text-5xl md:text-7xl font-display font-bold mb-4 tracking-tight">
            LexDisca <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-violet-400 to-emerald-400 animate-gradient">3D</span>
        </h1>
        <p class="text-slate-400 max-w-2xl mx-auto text-lg font-light">
            Selecciona una unidad del plan de estudios para acceder a los módulos de legislación, jurisprudencia y autoevaluación.
        </p>
    </header>

    <main class="relative max-w-5xl mx-auto px-4 py-10 z-10">
        <div class="timeline-line hidden md:block"></div>

        <div id="roadmap-container" class="space-y-16 md:space-y-24 relative">
            </div>
    </main>

    <div id="unit-modal" class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8">
        <div class="modal-content glass-panel w-full max-w-6xl max-h-[90vh] rounded-[2rem] overflow-hidden flex flex-col border-t border-l border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.8)]">
            
            <div class="p-6 md:p-8 border-b border-white/5 flex justify-between items-start relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 via-violet-500 to-emerald-500"></div>
                <div>
                    <span id="modal-unit-number" class="text-cyan-400 font-bold tracking-widest text-sm uppercase mb-2 block">Unidad X</span>
                    <h2 id="modal-unit-title" class="text-3xl md:text-4xl font-display font-bold text-white">Título de la Unidad</h2>
                </div>
                <button onclick="closeModal()" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-slate-400 hover:text-white hover:bg-red-500/20 transition-all">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <div class="p-6 md:p-8 overflow-y-auto flex-1">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    
                    <button onclick="alert('Abriendo Explorador Íntegro... (Próximo módulo a programar)')" class="glass-panel p-8 rounded-3xl text-left glow-cyan transition-all group">
                        <div class="w-14 h-14 rounded-2xl bg-cyan-500/10 flex items-center justify-center mb-6 group-hover:bg-cyan-500/20 transition-all">
                            <i class="fas fa-book-open text-2xl text-cyan-400 shadow-cyan-500/50 drop-shadow-lg"></i>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2">Explorador Íntegro</h3>
                        <p class="text-sm text-slate-400 font-light">Articulado completo, normas y tratados internacionales.</p>
                    </button>

                    <button onclick="alert('Abriendo Laboratorio de Casos... (Próximo módulo a programar)')" class="glass-panel p-8 rounded-3xl text-left glow-violet transition-all group">
                        <div class="w-14 h-14 rounded-2xl bg-violet-500/10 flex items-center justify-center mb-6 group-hover:bg-violet-500/20 transition-all">
                            <i class="fas fa-balance-scale text-2xl text-violet-400 shadow-violet-500/50 drop-shadow-lg"></i>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2">Laboratorio de Casos</h3>
                        <p class="text-sm text-slate-400 font-light">Análisis de fallos reales de la CSJN y aplicación práctica.</p>
                    </button>

                    <button onclick="alert('Abriendo Simulador de Carrera... (Próximo módulo a programar)')" class="glass-panel p-8 rounded-3xl text-left glow-emerald transition-all group">
                        <div class="w-14 h-14 rounded-2xl bg-emerald-500/10 flex items-center justify-center mb-6 group-hover:bg-emerald-500/20 transition-all">
                            <i class="fas fa-chalkboard-teacher text-2xl text-emerald-400 shadow-emerald-500/50 drop-shadow-lg"></i>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2">Simulador Estatuto</h3>
                        <p class="text-sm text-slate-400 font-light">Derechos, deberes y carrera docente (Ley 10.579).</p>
                    </button>

                    <button onclick="alert('Abriendo Desafío de Nivel... (Próximo módulo a programar)')" class="glass-panel p-8 rounded-3xl text-left glow-cyan transition-all group lg:col-span-2">
                        <div class="flex items-center gap-6">
                            <div class="w-14 h-14 rounded-2xl bg-orange-500/10 flex items-center justify-center shrink-0 group-hover:bg-orange-500/20 transition-all">
                                <i class="fas fa-gamepad text-2xl text-orange-400 shadow-orange-500/50 drop-shadow-lg"></i>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-white mb-1">Desafío de Nivel</h3>
                                <p class="text-sm text-slate-400 font-light">Evaluación interactiva Múltiple Choice para acreditar conocimientos de esta unidad.</p>
                            </div>
                        </div>
                    </button>

                    <button onclick="alert('Abriendo Cine-Debate... (Próximo módulo a programar)')" class="glass-panel p-8 rounded-3xl text-left glow-violet transition-all group">
                        <div class="flex items-center gap-6">
                            <div class="w-14 h-14 rounded-2xl bg-pink-500/10 flex items-center justify-center shrink-0 group-hover:bg-pink-500/20 transition-all">
                                <i class="fas fa-film text-2xl text-pink-400 shadow-pink-500/50 drop-shadow-lg"></i>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-white mb-1">Cine-Debate</h3>
                                <p class="text-sm text-slate-400 font-light">Análisis audiovisual.</p>
                            </div>
                        </div>
                    </button>

                </div>
            </div>
        </div>
    </div>

    <script>
        // EL PLAN DE ESTUDIOS (Extraído fielmente de tu documento)
        const PLAN_DE_ESTUDIOS = [
            {
                id: 1,
                numero: "01",
                titulo: "Fundamentos Jurídicos",
                desc: "Naturaleza de la Discriminación, Marco Internacional (OEA), Derechos Humanos y Sistema de Fuentes.",
                color: "cyan",
                icon: "fa-globe-americas"
            },
            {
                id: 2,
                numero: "02",
                titulo: "Políticas Públicas",
                desc: "Personalidad Jurídica en Argentina. Inclusión y Derechos Económicos, Sociales y Culturales (DESC).",
                color: "violet",
                icon: "fa-chart-pie"
            },
            {
                id: 3,
                numero: "03",
                titulo: "Protección Integral",
                desc: "El Estado como articulador. Constitución Nacional, Ley 22.431, CUD y Organizaciones Sociales.",
                color: "emerald",
                icon: "fa-shield-alt"
            },
            {
                id: 4,
                numero: "04",
                titulo: "Memoria Histórica",
                desc: "Sistema de Prestaciones Básicas (Ley 24.901). Decretos reglamentarios y vulnerabilidad social.",
                color: "cyan",
                icon: "fa-landmark"
            },
            {
                id: 5,
                numero: "05",
                titulo: "Salud y Seguridad Social",
                desc: "Leyes de Salud Mental, Hipoacusia, Epilepsia. Obras Sociales y el rol del equipo interdisciplinario.",
                color: "violet",
                icon: "fa-heartbeat"
            },
            {
                id: 6,
                numero: "06",
                titulo: "Empleo y Riesgos",
                desc: "Legislación Laboral (Ley 24.013/Ley Bases), Riesgos del Trabajo (Ley 24.557) y Talleres Protegidos.",
                color: "emerald",
                icon: "fa-briefcase"
            },
            {
                id: 7,
                numero: "07",
                titulo: "El Rol Docente",
                desc: "Leyes de Educación, Estatuto Docente (Ley 10.579). Ética profesional y Organismos Internacionales.",
                color: "cyan",
                icon: "fa-chalkboard-teacher"
            }
        ];

        // Función para renderizar el Roadmap
        function renderRoadmap() {
            const container = document.getElementById('roadmap-container');
            let html = '';

            PLAN_DE_ESTUDIOS.forEach((unidad, index) => {
                // Alternar alineación para diseño zig-zag en escritorio
                const isEven = index % 2 !== 0;
                const flexLayout = isEven ? 'md:flex-row-reverse' : 'md:flex-row';
                const textLayout = isEven ? 'md:text-right' : 'md:text-left';
                
                // Mapeo de colores a clases Tailwind
                const glowClass = `glow-${unidad.color}`;
                const textGlow = `text-${unidad.color}-400`;
                const bgGlow = `bg-${unidad.color}-500/10`;

                html += `
                    <div class="timeline-node flex flex-col ${flexLayout} items-center md:items-stretch w-full" onclick="openModal(${unidad.id})">
                        
                        <div class="w-full md:w-5/12 glass-panel p-6 md:p-8 rounded-[2rem] ${glowClass} ${textLayout} relative group">
                            <span class="${textGlow} font-bold tracking-widest text-xs uppercase mb-3 block opacity-80">Unidad ${unidad.numero}</span>
                            <h2 class="text-2xl md:text-3xl font-display font-bold text-white mb-3 group-hover:text-white transition-colors">${unidad.titulo}</h2>
                            <p class="text-slate-400 font-light leading-relaxed">${unidad.desc}</p>
                        </div>

                        <div class="w-full md:w-2/12 flex justify-center items-center py-6 md:py-0 relative z-20">
                            <div class="w-16 h-16 rounded-full glass-panel border border-${unidad.color}-500/50 flex items-center justify-center shadow-[0_0_20px_rgba(var(--neon-${unidad.color}),0.5)]">
                                <i class="fas ${unidad.icon} text-2xl ${textGlow}"></i>
                            </div>
                        </div>
                        
                        <div class="w-full md:w-5/12"></div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Funciones del Modal
        const modal = document.getElementById('unit-modal');
        const modalNum = document.getElementById('modal-unit-number');
        const modalTitle = document.getElementById('modal-unit-title');

        function openModal(id) {
            const unidad = PLAN_DE_ESTUDIOS.find(u => u.id === id);
            if(unidad) {
                modalNum.innerText = `Unidad ${unidad.numero}`;
                modalTitle.innerText = unidad.titulo;
                modal.classList.add('active');
            }
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // Cerrar modal al hacer clic fuera del contenido
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Inicializar
        document.addEventListener('DOMContentLoaded', renderRoadmap);
    </script>
</body>
</html>
